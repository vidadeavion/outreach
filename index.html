<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedfffIn Profile Analyzer</title>
    <!-- Bootswatch Pulse Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/pulse/bootstrap.min.css">
    <style>
        body { padding-top: 70px; display: flex; flex-direction: column; min-height: 100vh; }
        footer { margin-top: auto; padding: 20px 0; background: #f8f9fa; text-align: center; }
        #responseArea { min-height: 300px; white-space: pre-wrap; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">Proffffile AI Analyzer</a>
    </div>
</nav>

<main class="container my-4 flex-grow-1">
    <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#input-tab" type="button">Input Profile</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#output-tab" type="button">Analysis Result</button>
        </li>
    </ul>

    <div class="tab-content mt-3">
        <div class="tab-pane fade show active" id="input-tab">
            <div class="mb-3">
                <label for="profileInput" class="form-label">Paste LinkedIn Profile Text:</label>
                <textarea class="form-control" id="profileInput" rows="10" placeholder="Paste full profile content here..."></textarea>
            </div>
            <button id="analyzeBtn" class="btn btn-primary w-100">Analyze Profile</button>
        </div>
        <div class="tab-pane fade" id="output-tab">
            <div class="card card-body bg-light" id="responseArea">Waiting for analysis...</div>
        </div>
    </div>
</main>

<footer>
    <div class="container">Built for LinkedIn Insights</div>
</footer>

<!-- jQuery and Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

<script>

var rawPrompt = `You are a precision data extraction and formatting tool. Your task is to analyze the provided LinkedIn profile text (Headline, About, Experience) and populate the following template.

**CRITICAL:** You are forbidden from deviating from these template structures. Do not add any extra formatting, commentary, or Markdown code fences like `+ "```" +` to your final output.

--- TEMPLATE: InMail Message ---

## InMail Message To [First Name & Last Name] @ [Coaching Company Name]

## Subject

Your content constraints are a choice

## Message

Hi [First Name],

I've been following your work at [Agency Name] and I like your agency's focus on [Specific Niche from their profile].

I'm the founder of Aria OS, a content operations platform for agencies that are hitting a ceiling on scale.

We build the system that allows you to 8x your content output without sacrificing the brand voice your clients pay a premium for.

So here's the real question: how much money are you leaving on the table because your team can't crank out perfectly on-brand content fast enough to keep up with your best clients?

If you're open to it, I'd be happy to share the framework we're using to solve this for other high-growth agencies.

--- END TEMPLATE: InMail Message ---

YOUR INSTRUCTIONS:

1. **Extract [First Name]:** Find the prospect's first name.
2. **Extract [[Coaching Company Name]]:** Find the prospect's current company or coaching moniker, etc
3. **Extract [Specific Niche from their profile]:** Analyze the "About" and "Experience" sections to find the single best detail that describes their coaching's specific focus.

Your final output will be ONLY the populated template, separated by a clear marker.`;

   
    const apiKey = "AQ.Ab8RN6JFSei0ogXcZjPx8Zrimn89DHiTiBVYWtG16GfH3vo78g"; // Set your API key here
    
    const model = "gemini-3.1-flash-lite"; // Using available Flash-Lite model

    const prompt = "talk like leila hormozi from acquisition.com. be concise. respond to whatever the user said. User Request: ";

    $('#analyzeBtn').on('click', async function() {
        const text = $('#profileInput').val();
        if (!text) return alert("Please paste profile text first.");
        
        $('#responseArea').text("Analyzing...");
        $('button[data-bs-target="#output-tab"]').tab('show');


const requestString = rawPrompt + text;

console.log("requestString / "+ requestString);

alert(requestString);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: requestString }] }]
                })
            });

            const data = await response.json();

            console.log("response? : ",data);

            const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received.";
            $('#responseArea').text(result);
        } catch (error) {
            $('#responseArea').text("Error: " + error.message);
        }
    });
</script>
</body>
</html>
